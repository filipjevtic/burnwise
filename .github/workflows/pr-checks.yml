name: PR Checks

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/schema
          npm run build --workspace=packages/pricing

      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/server

      - name: Lint
        run: npm run lint

      - name: Design system guardrail (impeccable detector)
        run: node .claude/skills/impeccable/scripts/detect.mjs apps/web/src

      - name: Typecheck
        run: npm run typecheck --workspaces

      - name: Build
        run: npm run build --workspaces

      - name: Unit tests
        run: npm run test --workspaces --if-present

      - name: Coverage gate (server analytics core)
        run: npm run test:coverage --workspace=apps/server

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: server-coverage
          path: apps/server/coverage/
          retention-days: 7

      - name: Start PostgreSQL
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            docker compose exec -T postgres pg_isready -U ats && break
            sleep 1
          done

      - name: Apply database migrations
        run: npx prisma migrate deploy
        working-directory: apps/server
        env:
          DATABASE_URL: postgresql://ats:ats@localhost:5432/ats

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Run E2E tests
        run: npm run e2e --workspace=apps/web
        env:
          CI: true
          JWT_SECRET: e2e-test-secret

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Stop Docker
        if: always()
        run: docker compose down