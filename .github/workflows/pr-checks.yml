name: PR Checks

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Build shared schema
        run: npm run build --workspace=packages/schema

      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/server

      - name: Typecheck
        run: npm run typecheck --workspaces

      - name: Build
        run: npm run build --workspaces

      - name: Unit tests
        run: npm run test --workspace=packages/schema --if-present

      - name: Start PostgreSQL
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            docker compose exec -T postgres pg_isready -U ats && break
            sleep 1
          done

      - name: Push schema to database
        run: npx prisma db push --skip-generate --accept-data-loss
        working-directory: apps/server
        env:
          DATABASE_URL: postgresql://ats:ats@localhost:5432/ats

      - name: Seed demo data
        run: npm run db:seed --workspace=apps/server
        env:
          DATABASE_URL: postgresql://ats:ats@localhost:5432/ats

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Run E2E tests
        run: npm run e2e --workspace=apps/web
        env:
          CI: true
          JWT_SECRET: e2e-test-secret

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Stop Docker
        if: always()
        run: docker compose down