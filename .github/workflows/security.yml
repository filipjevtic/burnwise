name: Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly scan, Mondays 07:30 UTC, to catch newly disclosed CVEs.
    - cron: '30 7 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy filesystem & config scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Report everything (dependencies + IaC/config) to the Security tab.
      - name: Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,config
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # Gate: fail the build on fixable CRITICAL/HIGH vulnerabilities in
      # production dependencies. Dev dependencies (build/test tooling) are
      # excluded by default for npm lockfiles. MEDIUM and below are reported to
      # the Security tab (above) and tracked via Dependabot.
      - name: Trivy gate (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
