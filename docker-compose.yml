services:
  postgres:
    image: postgres:16-alpine
    container_name: burnwise-postgres
    environment:
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats
      POSTGRES_DB: ats
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: burnwise-server
    environment:
      DATABASE_URL: postgresql://ats:ats@postgres:5432/ats
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      INGEST_API_KEY: ${INGEST_API_KEY:-dev-key}
      APP_URL: ${APP_URL:-http://localhost:8080}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-https://gitlab.com}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_DISPLAY_NAME: ${OIDC_DISPLAY_NAME:-SSO}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid email profile}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    container_name: burnwise-proxy
    environment:
      SERVER_URL: http://server:3000
      INGEST_API_KEY: ${INGEST_API_KEY:-dev-key}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - server

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: burnwise-web
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      - server

volumes:
  postgres-data:
